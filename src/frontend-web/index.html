<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="灵犀伴学 - AI 驱动的儿童成长与学习陪伴平台" />
    <title>灵犀伴学 - AI 成长伙伴</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore original URL after 404.html redirect (GitHub Pages SPA support)
      (function() {
        var stored = sessionStorage.getItem('gh-pages-redirect');
        if (stored) {
          sessionStorage.removeItem('gh-pages-redirect');
          history.replaceState(null, '', stored);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
