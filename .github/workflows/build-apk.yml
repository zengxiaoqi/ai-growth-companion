name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get Flutter dependencies
        run: |
          cd src/frontend
          flutter pub get

      - name: Build APK
        run: |
          cd src/frontend
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: src/frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src/frontend/build/
            ~/.gradle/caches/
          retention-days: 7