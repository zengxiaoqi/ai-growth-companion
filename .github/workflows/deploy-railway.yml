name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'railway.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd src/backend
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
