services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: lingxi-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/lingxi.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - backend-data:/app/data
    networks:
      - lingxi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/contents"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./src/frontend-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: lingxi-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lingxi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  backend-data:
    driver: local

networks:
  lingxi-network:
    driver: bridge
